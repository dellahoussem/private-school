<!-- Topbar Start -->
<div class="container-fluid bg-dark">
    <div class="row py-2 px-lg-5">
        <div class="col-lg-6 text-center text-lg-left mb-2 mb-lg-0">
            <div class="d-inline-flex align-items-center text-white">
                <small><i class="fa fa-phone-alt mr-2"></i>+012 345 6789</small>
                <small class="px-3">|</small>
                <small><i class="fa fa-envelope mr-2"></i>info&#64;example.com</small>
            </div>
        </div>
        <div class="col-lg-6 text-center text-lg-right">
            <div class="d-inline-flex align-items-center">
                <a class="text-white px-2" href="#">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a class="text-white px-2" href="#">
                    <i class="fab fa-twitter"></i>
                </a>
                <a class="text-white px-2" href="#">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a class="text-white px-2" href="#">
                    <i class="fab fa-instagram"></i>
                </a>
                <a class="text-white pl-2" href="#">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
    </div>
</div>
<!-- Topbar End -->


<!-- Navbar Start -->
<div class="container-fluid p-0">
    <nav class="navbar navbar-expand-lg bg-white navbar-light py-3 py-lg-0 px-lg-5">
        <a routerLink="/" class="navbar-brand ml-lg-3">
            <h1 class="m-0 text-uppercase text-primary"><i class="fa fa-book-reader mr-3"></i>Edukate</h1>
        </a>
        <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between px-lg-3" id="navbarCollapse">
            <div class="navbar-nav mx-auto py-0">
                <a *ngIf="isloggedIn() && user.role!='teacher' && user.role!='admin' && user.role!='parent' && user.role!='student'"
                    routerLink="/" class="nav-item nav-link" routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: true}">Home</a>

                    <a *ngIf="isloggedIn() && user.role=='teacher'" routerLink="/teacher-dashboard" class="nav-item nav-link" routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: true}">Dashboard Teacher</a>

                    <a *ngIf="isloggedIn() && user.role=='student'" routerLink="/student-dashboard" class="nav-item nav-link" routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: true}">Dashboard Student</a>
               
                <a *ngIf="isloggedIn() && user.role=='admin'" routerLink="/users" class="nav-item nav-link"
                    routerLinkActive="active">Users</a>

                    <a *ngIf="isloggedIn() && user.role=='admin'" routerLink="/cours" class="nav-item nav-link"
                    routerLinkActive="active">Cours</a>

                
            </div>
            <div class="nav-item dropdown">
                <a *ngIf="!isloggedIn()" class="nav-link dropdown-toggle" data-toggle="dropdown">Sign-Up</a>
                <div class="dropdown-menu m-0">
                    <a class="dropdown-item" [routerLink]="['/signup', 'student']" routerLinkActive="active">Student</a>
                    <a class="dropdown-item" [routerLink]="['/signup', 'teacher']" routerLinkActive="active">Teacher</a>
                    <a class="dropdown-item" [routerLink]="['/signup', 'parent']" routerLinkActive="active">Parent</a>
                   


                </div>
            </div>
            <div class="navbar-nav mx-auto py-0">

                <li class="nav-item" *ngIf="!isloggedIn()">
                    <a class="nav-link" routerLink="/login" routerLinkActive="active">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                </li>
                <li *ngIf="isloggedIn()" class="nav-item">
                    <button class="btn btn-light" (click)="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </li>
            </div>



        </div>
    </nav>
</div>
<!-- Navbar End -->
