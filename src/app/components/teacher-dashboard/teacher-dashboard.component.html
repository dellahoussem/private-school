<div class="container mt-5">

  <h2 class="mb-4 text-center font-weight-bold">
    🎓 Teacher Dashboard
  </h2>

  <!-- 📊 STATISTICS -->
  <div class="row text-center mb-5">

    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body">
          <h5>Total Courses</h5>
          <h2 class="text-primary">{{ courses.length }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body">
          <h5>Total Students</h5>
          <h2 class="text-success">{{ totalStudents }}</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- ➕ ADD COURSE -->
  <div class="mb-4 text-right">
    <button class="btn btn-primary" routerLink="/add-course">
      + Ajouter Cours
    </button>
  </div>

  <!-- 📚 LIST COURSES -->
  <div class="row">

   <app-cours-teacher
  [courses]="courses"
  (deleteCourseEvent)="deleteCourse($event)">
</app-cours-teacher>

  </div>

</div>
