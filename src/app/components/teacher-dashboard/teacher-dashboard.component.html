<div class="container mt-5">

  <h2 class="mb-4 text-center font-weight-bold">
    🎓 Teacher Dashboard
  </h2>

  <!-- 📊 STATISTICS -->
  <div class="row text-center mb-5">

    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body">
          <h5>Total Courses</h5>
          <h2 class="text-primary">{{ courses.length }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body">
          <h5>Total Students</h5>
          <h2 class="text-success">{{ totalStudents }}</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- ➕ ADD COURSE -->
  <div class="mb-4 text-right">
    <button class="btn btn-primary"
            routerLink="/add-course">
      + Ajouter Cours
    </button>
  </div>

  <!-- 📚 LIST COURSES -->
  <div class="row">

    <div class="col-md-4 mb-4"
         *ngFor="let course of courses">

      <div class="card shadow h-100 border-0">
        <div class="card-body">

          <h5 class="font-weight-bold">
            {{ course.name }}
          </h5>

          <p class="text-muted">
            {{ course.description }}
          </p>

          <hr>

          <p>
            👥 Students :
            <strong>{{ course.studentsId.length }}</strong>
          </p>

          <div class="d-flex justify-content-between">

            <button class="btn btn-sm btn-info"
                    [routerLink]="['/teacher-courses', course._id]">
              Voir
            </button>

            <button class="btn btn-sm btn-warning"
                    [routerLink]="['/edit-course', course._id]">
              Modifier
            </button>

            <button class="btn btn-sm btn-danger"
                    (click)="deleteCourse(course._id)">
              Supprimer
            </button>

          </div>

        </div>
      </div>

    </div>

  </div>

</div>
