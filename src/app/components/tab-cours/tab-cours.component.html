<div class="container mt-4">
  <h2 class="mb-3">Liste des Cours</h2>

  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>Nom</th>
        
        <th>Durée (h)</th>
        <th>Date de début</th>
        <th>Teacher</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cours of coursList">
        <td>{{ cours.name }}</td>
        
        <td>{{ cours.duration }}</td>
        <td>{{ cours.startDate | date:'dd/MM/yyyy' }}</td>
        <td>{{ cours.teacherId?.firstName }} {{ cours.teacherId?.lastName }}</td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="deleteCours(cours._id)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
